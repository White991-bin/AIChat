<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="brand-group">
                <div class="brand-mark" aria-hidden="true">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="brand-copy">
                    <span class="brand-title">AI聊天助手</span>
                    <span class="brand-subtitle">智能会话中心</span>
                </div>
                <button class="primary-btn" id="newChatBtn" type="button">
                    <i class="fas fa-plus"></i>
                    <span>新建对话</span>
                </button>
            </div>
            <div class="header-status" id="headerStatus">已连接到 115.175.6.15:8080</div>
        </header>

        <div class="app-main">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div>
                        <p class="sidebar-eyebrow">会话列表</p>
                        <h2>历史对话</h2>
                    </div>
                    <span class="session-count" id="sessionCount">0 条</span>
                </div>
                <div class="session-list" id="sessionList"></div>
            </aside>

            <main class="workspace">
                <section class="welcome-state" id="welcomeState">
                    <div class="welcome-card">
                        <div class="welcome-icon" aria-hidden="true">
                            <i class="fas fa-comments"></i>
                        </div>
                        <h1>选择一个历史对话继续，或创建新的对话，开启您的AI之旅</h1>
                        <p>支持多模型会话、流式回答、Markdown 渲染、代码高亮和一键复制。</p>
                        <button class="hero-btn" id="welcomeNewChatBtn" type="button">新建对话</button>
                    </div>
                </section>

                <section class="chat-state hidden" id="chatState">
                    <div class="chat-toolbar">
                        <div>
                            <p class="sidebar-eyebrow">当前会话</p>
                            <h2 id="chatTitle">AI聊天助手</h2>
                        </div>
                        <div class="chat-toolbar-meta">
                            <span class="model-pill" id="chatModelBadge">未选择模型</span>
                            <span class="chat-meta-text" id="chatMetaText">请选择历史会话或创建新会话</span>
                        </div>
                    </div>

                    <div class="messages-panel">
                        <div class="messages-container" id="messagesContainer"></div>
                    </div>

                    <div class="composer-panel">
                        <label class="sr-only" for="messageInput">消息输入框</label>
                        <textarea
                            id="messageInput"
                            placeholder="请输入您的消息...(Enter发送，Shift+Enter换行)"
                            maxlength="2000"
                        ></textarea>
                        <div class="composer-footer">
                            <div class="composer-hint">支持 Markdown，代码块会自动高亮并支持复制</div>
                            <div class="composer-actions">
                                <button class="send-btn" id="sendBtn" type="button">
                                    <i class="fas fa-paper-plane"></i>
                                    <span>发送</span>
                                </button>
                                <span class="char-count" id="charCount">0/2000</span>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modelModal">
        <div class="model-modal" role="dialog" aria-modal="true" aria-labelledby="modelModalTitle">
            <div class="modal-header">
                <div>
                    <p class="sidebar-eyebrow">新建会话</p>
                    <h3 id="modelModalTitle">选择模型</h3>
                </div>
                <button class="icon-btn" id="closeModal" type="button" aria-label="关闭窗口">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="model-grid" id="modelGrid"></div>
            </div>
            <div class="modal-footer">
                <button class="ghost-btn" id="cancelBtn" type="button">取消</button>
                <button class="primary-btn" id="confirmBtn" type="button">确定</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-card">
            <i class="fas fa-spinner fa-spin"></i>
            <span id="loadingText">处理中...</span>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
